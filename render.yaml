services:
  - type: web
    name: ko-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: >
      corepack enable &&
      corepack prepare pnpm@10.15.0 --activate &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/api-server run build
    startCommand: node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: LOG_LEVEL
        value: info

      # ── Firebase (Firestore database) ────────────────────────
      # Paste the full JSON content of your service account key here
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false

      # ── Payments (Razorpay) ──────────────────────────────────
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

      # ── Email (Nodemailer / Gmail) ────────────────────────────
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_APP_PASSWORD
        sync: false

      # ── Admin & Notifications ────────────────────────────────
      - key: ADMIN_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false

      # ── CORS ─────────────────────────────────────────────────
      # Set to your Netlify domain, e.g. https://konjoondu-oorgai.netlify.app
      - key: CORS_ORIGIN
        sync: false
